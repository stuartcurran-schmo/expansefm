<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Solar Radio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #05080f;
    --fg: rgba(255,255,255,0.85);
    --fg-dim: rgba(255,255,255,0.3);
    --fg-faint: rgba(255,255,255,0.1);
    --accent: #7eb8d4;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Courier New', monospace;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }

  #starfield {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* everything above the starfield */
  #start-screen, #app, #debug { position: relative; z-index: 1; }
  #start-screen { position: fixed; z-index: 100; }


  #start-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 100;
    transition: opacity 0.8s;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }

  #start-screen h1 {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--fg-dim);
    text-transform: uppercase;
  }

  #start-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: var(--fg);
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  #start-btn:active { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.5); }

  /* ── MAIN UI ── */
  #app {
    width: 100%;
    max-width: 420px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 48px 24px 40px;
  }

  /* ── PLANET DISPLAY ── */
  #planet-display {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    position: relative;
    width: 100%;
  }

  .planet-wrap {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: opacity 0.3s, transform 0.3s;
  }

  .planet-sphere {
    border-radius: 50%;
  }

  .planet-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--fg-dim);
  }

  /* ── SIGNAL METER ── */
  #signal-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  #signal-label {
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--fg-faint);
    text-transform: uppercase;
  }

  #signal-track {
    width: 180px;
    height: 1px;
    background: var(--fg-faint);
    position: relative;
  }

  #signal-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--accent);
    transition: width 0.15s;
  }

  #planet-name-display {
    font-size: 22px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    min-height: 30px;
    text-align: center;
  }

  /* ── DIAL ── */
  #dial-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  #dial-outer {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: grab;
  }
  #dial-outer:active { cursor: grabbing; }

  /* tick marks around the dial */
  .dial-tick {
    position: absolute;
    width: 1px;
    height: 8px;
    background: rgba(255,255,255,0.15);
    top: 8px;
    left: 50%;
    transform-origin: 0 102px;
  }

  #dial-inner {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: radial-gradient(circle at 38% 35%, #1a1f2e, #070a12);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #dial-pip {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 14px;
    background: rgba(255,255,255,0.7);
    border-radius: 1px;
    transform-origin: 1px 68px;
  }

  #dial-centre {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }

  /* ── POSITION STRIP ── */
  #strip {
    width: 280px;
    height: 20px;
    position: relative;
  }

  #strip-line {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: var(--fg-faint);
  }

  .strip-planet {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
  }

  #strip-cursor {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 8px rgba(255,255,255,0.6);
    transition: left 0.06s;
  }

  /* ── DEBUG PANEL ── */
  #debug {
    position: fixed;
    top: 12px;
    right: 12px;
    font-size: 8px;
    color: var(--fg-faint);
    letter-spacing: 0.1em;
    text-align: right;
    line-height: 1.8;
  }

  /* ── LOADING STATE ── */
  #load-status {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--fg-faint);
    text-transform: uppercase;
    min-height: 14px;
  }
</style>
</head>
<body>

<!-- STARFIELD -->
<canvas id="starfield"></canvas>

<!-- START SCREEN -->
<div id="start-screen">
  <h1>Solar Radio</h1>
  <button id="start-btn">TUNE<br>IN</button>
</div>

<!-- MAIN APP -->
<div id="app">

  <div id="planet-display">
    <div class="planet-wrap" id="wrap-a">
      <div style="position:relative;display:flex;align-items:center;justify-content:center;">
        <div class="planet-sphere" id="sphere-a"></div>
        <canvas id="ring-canvas" style="position:absolute;pointer-events:none;"></canvas>
      </div>
      <div class="planet-label" id="label-a"></div>
    </div>
    <div class="planet-wrap" id="wrap-b" style="opacity:0">
      <div class="planet-sphere" id="sphere-b"></div>
      <div class="planet-label" id="label-b"></div>
    </div>
  </div>

  <div id="signal-section">
    <div id="planet-name-display">—</div>
    <div id="signal-track"><div id="signal-fill" style="width:0%"></div></div>
    <div id="signal-label">signal strength</div>
    <div id="load-status">tap to begin</div>
  </div>

  <div id="dial-section">
    <div id="dial-outer">
      <!-- tick marks -->
      <div id="ticks"></div>
      <div id="dial-inner">
        <div id="dial-pip"></div>
        <div id="dial-centre"></div>
      </div>
    </div>

    <div id="strip">
      <div id="strip-line"></div>
    </div>
  </div>

</div>

<div id="debug"></div>

<script>
// ── PLANET DATA ──────────────────────────────────────────────
// Edit the `file` paths to match your actual filenames.
// AU values drive the logarithmic spacing on the dial.
const PLANETS = [
  { name: 'Sun',     file: 'sun.mp3',     au: 0.0,  color: '#f5c842', size: 72 },
  { name: 'Mercury', file: 'mercury.mp3', au: 0.39, color: '#b5a49a', size: 34 },
  { name: 'Venus',   file: 'venus.mp3',   au: 0.72, color: '#e8c97a', size: 44 },
  { name: 'Earth',   file: 'earth.mp3',   au: 1.00, color: '#4a9fd4', size: 46 },
  { name: 'Mars',    file: 'mars.mp3',    au: 1.52, color: '#c1440e', size: 38 },
  { name: 'Jupiter', file: 'jupiter.mp3', au: 5.20, color: '#c9a87c', size: 70 },
  { name: 'Saturn',  file: 'saturn.mp3',  au: 9.58, color: '#e8d5a3', size: 62 },
  { name: 'Uranus',  file: 'uranus.mp3',  au: 19.2, color: '#7de8e8', size: 52 },
  { name: 'Neptune', file: 'neptune.mp3', au: 30.1, color: '#5b7fdb', size: 50 },
  { name: 'Pluto',   file: 'pluto.mp3',   au: 39.5, color: '#c4b8a8', size: 28 },
];

// ── AUDIO PATH ───────────────────────────────────────────────
// Set this to the folder containing your MP3 files.
// If the HTML file is in the same folder as the MP3s, leave as ''.
const AUDIO_PATH = 'assets/audio/';

// ── LOG SCALE MAPPING ────────────────────────────────────────
// Maps AU distance to a 0-1 dial position using log scale.
// Sun at au=0 gets a small offset so log doesn't hit -Infinity.
const LOG_OFFSET = 0.5;
const logAUs = PLANETS.map(p => Math.log(p.au + LOG_OFFSET));
const minLog = logAUs[0];
const maxLog = logAUs[logAUs.length - 1];
PLANETS.forEach((p, i) => { p.t = (logAUs[i] - minLog) / (maxLog - minLog); });

// Boundaries between planets (midpoints in t-space)
const BOUNDS = [];
for (let i = 0; i < PLANETS.length - 1; i++) {
  BOUNDS.push((PLANETS[i].t + PLANETS[i+1].t) / 2);
}

function getPlanetIdx(t) {
  for (let i = 0; i < BOUNDS.length; i++) {
    if (t < BOUNDS[i]) return i;
  }
  return PLANETS.length - 1;
}

// Signal strength: 1.0 at planet centre, falls off toward boundary
function signalStrength(t, idx) {
  const p = PLANETS[idx];
  const dist = Math.abs(t - p.t);
  const leftEdge  = idx > 0 ? BOUNDS[idx - 1] : 0;
  const rightEdge = idx < BOUNDS.length ? BOUNDS[idx] : 1;
  const halfZone  = Math.max(p.t - leftEdge, rightEdge - p.t);
  return Math.max(0, 1 - (dist / halfZone) * 1.4);
}

// ── WEB AUDIO SETUP ──────────────────────────────────────────
let ctx, masterGain;
const buffers = {};
const sources = {};  // planet name -> { source, gainNode }

function initAudio() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = ctx.createGain();
  masterGain.connect(ctx.destination);
  masterGain.gain.value = 1.0;
  // iOS suspends AudioContext even when created inside a user gesture
  if (ctx.state === 'suspended') ctx.resume();
}

function decodeAudioCompat(arrayBuf) {
  // Callback style — iOS WebKit doesn't reliably support Promise-based decodeAudioData
  return new Promise((resolve, reject) => {
    ctx.decodeAudioData(arrayBuf, resolve, reject);
  });
}

async function loadAll() {
  const statusEl = document.getElementById('load-status');
  let loaded = 0;
  await Promise.all(PLANETS.map(async p => {
    try {
      const res = await fetch(AUDIO_PATH + p.file);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const arrayBuf = await res.arrayBuffer();
      buffers[p.name] = await decodeAudioCompat(arrayBuf);
      loaded++;
      statusEl.textContent = `loading ${loaded}/${PLANETS.length}`;
    } catch (e) {
      console.warn(`Could not load ${p.file}:`, e.message);
      buffers[p.name] = null;
      loaded++;
      statusEl.textContent = `loading ${loaded}/${PLANETS.length}`;
    }
  }));
  statusEl.textContent = '';
}

function startPlanet(name) {
  if (sources[name] || !buffers[name]) return;
  const buf = buffers[name];
  const source = ctx.createBufferSource();
  source.buffer = buf;
  source.loop = true;
  const gainNode = ctx.createGain();
  gainNode.gain.value = 0;
  source.connect(gainNode);
  gainNode.connect(masterGain);
  source.start();
  sources[name] = { source, gainNode };
}

function setGain(name, value, rampTime = 0.1) {
  if (!sources[name]) return;
  const g = sources[name].gainNode.gain;
  g.cancelScheduledValues(ctx.currentTime);
  g.linearRampToValueAtTime(value, ctx.currentTime + rampTime);
}

function stopAll() {
  Object.keys(sources).forEach(name => {
    try { sources[name].source.stop(); } catch(e) {}
    delete sources[name];
  });
}

// ── STATIC NOISE ─────────────────────────────────────────────
let staticGain;

function initStatic() {
  // White noise via ScriptProcessor (widely supported incl. iOS)
  const bufferSize = 2048;
  const noiseNode  = ctx.createScriptProcessor(bufferSize, 1, 1);
  noiseNode.onaudioprocess = e => {
    const out = e.outputBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      out[i] = (Math.random() * 2 - 1) * 0.35;
    }
  };
  // Bandpass filter to give it that AM radio character
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1800;
  filter.Q.value = 0.6;

  staticGain = ctx.createGain();
  staticGain.gain.value = 0;

  noiseNode.connect(filter);
  filter.connect(staticGain);
  staticGain.connect(masterGain);
}

function setStaticGain(value, rampTime = 0.12) {
  if (!staticGain) return;
  const g = staticGain.gain;
  g.cancelScheduledValues(ctx.currentTime);
  g.linearRampToValueAtTime(value * 0.5, ctx.currentTime + rampTime);
}

// ── SATURN RINGS ─────────────────────────────────────────────
const ringCanvas = document.getElementById('ring-canvas');
const rCtx       = ringCanvas.getContext('2d');

function drawSaturnRings(planetDiameter, alpha, sphereColor) {
  if (alpha < 0.01) {
    rCtx.clearRect(0, 0, ringCanvas.width, ringCanvas.height);
    ringCanvas.style.display = 'none';
    return;
  }
  ringCanvas.style.display = '';

  const r      = planetDiameter / 2;
  const outerR = r * 2.2;
  const yScale = 0.30;
  const cW     = Math.ceil(outerR * 2 + 4);
  const cH     = Math.ceil(outerR * yScale * 2 + planetDiameter + 4);

  ringCanvas.width  = cW;
  ringCanvas.height = cH;
  ringCanvas.style.width    = cW + 'px';
  ringCanvas.style.height   = cH + 'px';
  ringCanvas.style.position = 'absolute';
  ringCanvas.style.left     = `${-((cW - planetDiameter) / 2)}px`;
  ringCanvas.style.top      = `${-((cH - planetDiameter) / 2)}px`;

  rCtx.clearRect(0, 0, cW, cH);

  const cx = cW / 2;
  const cy = cH / 2;

  const rings = [
    { rMin: r * 1.22, rMax: r * 1.52, color: `rgba(215,198,155,${alpha * 0.60})` },
    { rMin: r * 1.58, rMax: r * 1.88, color: `rgba(200,180,135,${alpha * 0.48})` },
    { rMin: r * 1.94, rMax: r * 2.15, color: `rgba(178,162,120,${alpha * 0.32})` },
  ];

  // 1. Back half of rings
  rings.forEach(ring => {
    rCtx.beginPath();
    rCtx.ellipse(cx, cy, ring.rMax, ring.rMax * yScale, 0, Math.PI, Math.PI * 2);
    rCtx.ellipse(cx, cy, ring.rMin, ring.rMin * yScale, 0, Math.PI * 2, Math.PI, true);
    rCtx.fillStyle = ring.color;
    rCtx.fill();
  });

  // 2. Paint an opaque sphere disc on top of back rings — this is what actually
  //    occludes them. Must match the sphere's gradient closely enough to be seamless.
  const grad = rCtx.createRadialGradient(
    cx - r * 0.25, cy - r * 0.30, r * 0.05,  // highlight offset
    cx, cy, r
  );
  grad.addColorStop(0,   lighten(sphereColor));
  grad.addColorStop(0.55, sphereColor);
  grad.addColorStop(1,   '#060810');
  rCtx.beginPath();
  rCtx.arc(cx, cy, r - 0.5, 0, Math.PI * 2);
  rCtx.fillStyle = grad;
  rCtx.fill();

  // 3. Front half of rings — drawn over the sphere disc
  rings.forEach(ring => {
    rCtx.beginPath();
    rCtx.ellipse(cx, cy, ring.rMax, ring.rMax * yScale, 0, 0, Math.PI);
    rCtx.ellipse(cx, cy, ring.rMin, ring.rMin * yScale, 0, Math.PI, 0, true);
    rCtx.fillStyle = ring.color;
    rCtx.fill();
  });
}

// ── DIAL INTERACTION ─────────────────────────────────────────
let dialAngle   = 0;  // cumulative radians
let currentT    = 0;  // 0..1 position
let animT       = 0;
let isDragging  = false;
let lastPointerAngle = 0;

// Total rotation range: 5 full turns = full solar system sweep
const TOTAL_TURNS = 5;

const dialOuter = document.getElementById('dial-outer');
const dialPip   = document.getElementById('dial-pip');

function pointerAngle(e, rect) {
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const pt = e.touches ? e.touches[0] : e;
  return Math.atan2(pt.clientY - cy, pt.clientX - cx);
}

function onDragStart(e) {
  isDragging = true;
  lastPointerAngle = pointerAngle(e, dialOuter.getBoundingClientRect());
  e.preventDefault();
}

function onDragMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  const angle = pointerAngle(e, dialOuter.getBoundingClientRect());
  let delta = angle - lastPointerAngle;
  if (delta >  Math.PI) delta -= Math.PI * 2;
  if (delta < -Math.PI) delta += Math.PI * 2;
  lastPointerAngle = angle;
  dialAngle += delta;
  dialVelocity = delta;  // feeds into starfield speed
  currentT = Math.max(0, Math.min(1,
    dialAngle / (Math.PI * 2 * TOTAL_TURNS) + 0.5
  ));
  dialPip.style.transform = `translateX(-50%) rotate(${dialAngle}rad)`;
}

function onDragEnd() { isDragging = false; }

// Touch events (iOS Safari)
dialOuter.addEventListener('touchstart',  onDragStart, { passive: false });
dialOuter.addEventListener('touchmove',   onDragMove,  { passive: false });
dialOuter.addEventListener('touchend',    onDragEnd);
dialOuter.addEventListener('touchcancel', onDragEnd);

// Mouse events (desktop)
dialOuter.addEventListener('mousedown', onDragStart);
document.addEventListener('mousemove',  onDragMove);
document.addEventListener('mouseup',    onDragEnd);

// ── BUILD TICK MARKS ─────────────────────────────────────────
const tickContainer = document.getElementById('ticks');
for (let i = 0; i < 60; i++) {
  const tick = document.createElement('div');
  tick.className = 'dial-tick';
  tick.style.transform = `rotate(${i * 6}deg)`;
  if (i % 5 === 0) {
    tick.style.height = '12px';
    tick.style.background = 'rgba(255,255,255,0.28)';
  }
  tickContainer.appendChild(tick);
}

// ── BUILD STRIP DOTS ─────────────────────────────────────────
const strip = document.getElementById('strip');
PLANETS.forEach(p => {
  const dot = document.createElement('div');
  dot.className = 'strip-planet';
  dot.style.left = (p.t * 100) + '%';
  dot.style.background = p.color;
  strip.appendChild(dot);
});
const cursor = document.createElement('div');
cursor.id = 'strip-cursor';
strip.appendChild(cursor);

// ── STARFIELD ────────────────────────────────────────────────
const sfCanvas = document.getElementById('starfield');
const sfCtx    = sfCanvas.getContext('2d');
let sfW = 0, sfH = 0;
let dialVelocity = 0;  // tracks dial speed for star parallax

function resizeStarfield() {
  sfW = sfCanvas.width  = window.innerWidth;
  sfH = sfCanvas.height = window.innerHeight;
}
resizeStarfield();
window.addEventListener('resize', resizeStarfield);

// Three depth layers — further stars move slower and are dimmer
const STAR_LAYERS = [
  { count: 60,  speed: 0.12, minR: 0.3, maxR: 0.8,  minA: 0.15, maxA: 0.35 },
  { count: 50,  speed: 0.28, minR: 0.6, maxR: 1.2,  minA: 0.25, maxA: 0.55 },
  { count: 25,  speed: 0.55, minR: 1.0, maxR: 1.8,  minA: 0.45, maxA: 0.80 },
];

const stars = [];
STAR_LAYERS.forEach(layer => {
  for (let i = 0; i < layer.count; i++) {
    stars.push({
      x:     Math.random() * 2000,  // oversized so wrap isn't obvious
      y:     Math.random(),          // stored as 0-1, multiplied by sfH on draw
      r:     layer.minR + Math.random() * (layer.maxR - layer.minR),
      alpha: layer.minA + Math.random() * (layer.maxA - layer.minA),
      speed: layer.speed,
      // subtle twinkle
      twinkleOffset: Math.random() * Math.PI * 2,
      twinkleSpeed:  0.003 + Math.random() * 0.008,
    });
  }
});

let sfFrame = 0;

function drawStarfield() {
  sfCtx.clearRect(0, 0, sfW, sfH);
  sfFrame++;

  // Base drift + extra kick from dial movement
  const drift = 0.4 + Math.abs(dialVelocity) * 6;

  stars.forEach(s => {
    s.x -= s.speed * drift;
    if (s.x < -2) s.x += sfW + 4;

    const twinkle = 0.85 + 0.15 * Math.sin(sfFrame * s.twinkleSpeed + s.twinkleOffset);
    const a = s.alpha * twinkle;

    sfCtx.beginPath();
    sfCtx.arc(s.x % sfW, s.y * sfH, s.r, 0, Math.PI * 2);
    sfCtx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
    sfCtx.fill();
  });

  // Decay dial velocity
  dialVelocity *= 0.88;
}

// ── RENDER LOOP ───────────────────────────────────────────────
const sphereA     = document.getElementById('sphere-a');
const labelA      = document.getElementById('label-a');
const wrapA       = document.getElementById('wrap-a');
const sphereB     = document.getElementById('sphere-b');
const labelB      = document.getElementById('label-b');
const wrapB       = document.getElementById('wrap-b');
const signalFill  = document.getElementById('signal-fill');
const nameDisplay = document.getElementById('planet-name-display');
const debugEl     = document.getElementById('debug');

let lastPrimaryIdx = -1;

function renderFrame() {
  drawStarfield();
  // Clamp lerp so animT never overshoots currentT — prevents flick-back artefact
  const diff = currentT - animT;
  const step = diff * 0.1;
  animT += Math.abs(step) < Math.abs(diff) ? step : diff;

  const idx = getPlanetIdx(animT);
  const planet = PLANETS[idx];
  const sig = signalStrength(animT, idx);

  // Adjacent planet for crossfade
  const nextIdx = animT < planet.t
    ? idx - 1
    : idx + 1;

  // Update audio gains
  PLANETS.forEach(p => {
    if (!sources[p.name]) return;
    let gain = 0;
    if (p.name === planet.name) gain = sig;
    else if (nextIdx >= 0 && nextIdx < PLANETS.length && p.name === PLANETS[nextIdx].name) {
      const boundary = animT < planet.t ? BOUNDS[idx-1] : BOUNDS[idx];
      const distToBound = Math.abs(animT - boundary);
      const halfZone = Math.abs(planet.t - boundary);
      gain = Math.max(0, 1 - distToBound / (halfZone * 0.6)) * (1 - sig * 0.5);
    }
    setGain(p.name, gain * gain, 0.08); // squared for perceptual loudness
  });

  // Ensure relevant planets are started
  if (!sources[planet.name]) startPlanet(planet.name);
  if (nextIdx >= 0 && nextIdx < PLANETS.length) {
    startPlanet(PLANETS[nextIdx].name);
  }

  // Static noise — inverse of signal strength
  setStaticGain(1 - sig);

  // Planet sphere A (primary)
  const s = planet.size;
  sphereA.style.width  = s + 'px';
  sphereA.style.height = s + 'px';
  sphereA.style.background = `radial-gradient(circle at 35% 30%, ${lighten(planet.color)}, ${planet.color} 55%, #060810)`;
  labelA.textContent = planet.name;
  wrapA.style.opacity = sig;
  wrapA.style.transform = `scale(${0.85 + 0.15 * sig})`;

  // Saturn rings — canvas paints both the rings AND the sphere itself
  if (planet.name === 'Saturn') {
    sphereA.style.opacity = '0'; // ring canvas repaints the sphere
    drawSaturnRings(s, sig, planet.color);
  } else {
    sphereA.style.opacity = '1';
    ringCanvas.style.display = 'none';
  }

  // Planet sphere B (incoming)
  if (nextIdx >= 0 && nextIdx < PLANETS.length) {
    const np = PLANETS[nextIdx];
    const boundary = animT < planet.t ? BOUNDS[idx-1] : BOUNDS[idx];
    const distToBound = Math.abs(animT - boundary);
    const halfZone = Math.abs(planet.t - boundary);
    const bAlpha = Math.max(0, 1 - distToBound / (halfZone * 0.55)) * (1 - sig * 0.4);

    const ns = np.size;
    sphereB.style.width  = ns + 'px';
    sphereB.style.height = ns + 'px';
    sphereB.style.background = `radial-gradient(circle at 35% 30%, ${lighten(np.color)}, ${np.color} 55%, #060810)`;
    labelB.textContent = np.name;
    wrapB.style.opacity = bAlpha;
    wrapB.style.transform = `scale(${0.75 + 0.25 * bAlpha}) translateX(${(animT < planet.t ? -1 : 1) * 40 * (1 - bAlpha)}px)`;
  } else {
    wrapB.style.opacity = 0;
  }

  // Name display
  nameDisplay.textContent = sig > 0.3 ? planet.name.toUpperCase() : '· · ·';
  nameDisplay.style.color = sig > 0.3
    ? `rgba(255,255,255,${0.4 + sig * 0.6})`
    : 'rgba(255,255,255,0.15)';

  // Signal bar
  signalFill.style.width = Math.round(sig * 100) + '%';
  signalFill.style.background = planet.color;

  // Strip cursor
  cursor.style.left = (animT * 100) + '%';

  // Debug
  debugEl.textContent =
    `t: ${animT.toFixed(3)}\n` +
    `planet: ${planet.name}\n` +
    `signal: ${sig.toFixed(2)}`;

  requestAnimationFrame(renderFrame);
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
}

// ── START ─────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', async () => {
  const screen = document.getElementById('start-screen');
  screen.classList.add('hidden');

  initAudio();
  await ctx.resume(); // belt-and-braces for iOS
  await loadAll();
  initStatic();

  // Start at Earth (middle of the dial range)
  const earthT = PLANETS.find(p => p.name === 'Earth').t;
  currentT = earthT;
  animT    = earthT;
  dialAngle = (earthT - 0.5) * Math.PI * 2 * TOTAL_TURNS;
  dialPip.style.transform = `translateX(-50%) rotate(${dialAngle}rad)`;

  // Pre-start Earth audio
  startPlanet('Earth');

  renderFrame();
});
</script>
